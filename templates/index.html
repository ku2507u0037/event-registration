<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4e54c8,#8f94fb,#5f9cff);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:920px;
display:flex;
border-radius:20px;
overflow:hidden;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
box-shadow:0 25px 60px rgba(0,0,0,0.3);
transition:0.4s;
}

.container:hover{
transform:translateY(-5px);
box-shadow:0 30px 70px rgba(0,0,0,0.35);
}

.left{
width:40%;
padding:45px;
color:white;
background:linear-gradient(160deg,#6a11cb,#2575fc);
display:flex;
flex-direction:column;
justify-content:center;
}

.left h2{
font-size:34px;
margin-bottom:12px;
letter-spacing:1px;
}

.left p{
font-size:14px;
opacity:0.9;
line-height:1.5;
}

.right{
width:60%;
padding:40px;
background:rgba(255,255,255,0.08);
}

.input-group{
position:relative;
margin-bottom:20px;
}

input,select{
width:100%;
padding:13px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.25);
color:white;
font-size:14px;
transition:0.3s;
}

input:focus,select:focus{
background:rgba(255,255,255,0.4);
transform:scale(1.02);
box-shadow:0 0 10px rgba(255,255,255,0.4);
}

label{
position:absolute;
left:12px;
top:12px;
font-size:13px;
color:#eaeaea;
transition:0.25s;
}

input:focus + label,
input:not(:placeholder-shown) + label{
top:-9px;
font-size:11px;
color:white;
}

option{
color:black;
}

.multi{
height:95px;
}

button{
width:100%;
padding:13px;
border-radius:10px;
border:none;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:0 12px 25px rgba(0,0,0,0.4);
}

button:active{
transform:scale(0.97);
}

.success{
margin-top:15px;
color:#00ff9d;
font-weight:bold;
text-align:center;
}

@media(max-width:768px){

.container{
flex-direction:column;
width:92%;
}

.left,.right{
width:100%;
}

}

</style>

<script>

function updateEvents(){

let type=document.getElementById("event_type").value;
let select=document.getElementById("event_name");

let data={
"Ariaro":["Lok Sabha 🏛","AR-VR 🎮","Data Science 📊"],
"Eqinox":["Cricket 🏏","Volleyball 🏐","Basketball 🏀","Football ⚽"]
};

select.innerHTML="";

if(data[type]){
data[type].forEach(e=>{
let opt=document.createElement("option");
opt.value=e;
opt.text=e;
select.appendChild(opt);
});
}

}

</script>

</head>

<body>

<div class="container">

<div class="left">

<h2>EVENT REGISTRATION</h2>

<p>
Register for exciting college events and competitions.
Choose your event and confirm your participation.
</p>

</div>

<div class="right">

<form action="/register" method="POST">

<div class="input-group">
<input type="text" name="name" placeholder=" " required>
<label>Name</label>
</div>

<div class="input-group">
<input type="text" name="enrollment" placeholder=" " required>
<label>Enrollment ID</label>
</div>

<div class="input-group">
<input type="text" name="ku_id" placeholder=" " required>
<label>KU ID</label>
</div>

<div class="input-group">
<input type="text" name="class" placeholder=" " required>
<label>Class</label>
</div>

<div class="input-group">
<select id="event_type" name="event_type" onchange="updateEvents()" required>
<option value="">Select Event Type</option>
<option value="Ariaro">ARIARO</option>
<option value="Eqinox">EQINOX</option>
</select>
</div>

<div class="input-group">
<select id="event_name" name="event_name" multiple class="multi" required></select>
</div>

<button type="submit">REGISTER 🚀</button>

{% if success %}
<p class="success">Registration Done Successfully ✅</p>
{% endif %}

</form>

</div>

</div>

</body>
</html>
